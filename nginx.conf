upstream chatbot_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    # Cloud Run injecte PORT=8080 — Nginx DOIT écouter sur 8080
    listen 8080;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Charset
    charset utf-8;

    # ============================================
    # COMPRESSION GZIP - Performance Optimization
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    gzip_min_length 256;

    # ============================================
    # SECURITY HEADERS (Protection contre Clickjacking, XSS et CSRF)
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (Ajusté pour permettre les polices/images externes)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https:;" always;

    # HSTS (Sécurité renforcée pour HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ============================================
    # CANONICAL REDIRECT (www to non-www fallback)
    # ============================================
    # Note: Sur Cloud Run, le mapping domaine gère souvent cela, 
    # mais nous renforçons la sécurité ici.
    if ($host ~* ^www\.(.*)) {
        return 301 https://$1$request_uri;
    }


    # ============================================
    # CHATBOT API - Proxy to FastAPI backend
    # ============================================
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Increased timeouts for AI model response
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;

        # Retry si le backend redémarre
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    # ============================================
    # REACT ROUTER - SPA Support
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # STATIC ASSETS CACHING (1 Year for immutable assets)
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|avif)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        
        # CORS for fonts and static assets
        add_header Access-Control-Allow-Origin "*";
    }

    # ============================================
    # HTML - No Cache (for updates)
    # ============================================
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ============================================
    # PWA & SEO FILES
    # ============================================
    # Robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # Sitemap.xml
    location = /sitemap.xml {
        log_not_found off;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # Manifest.json (PWA)
    location = /manifest.json {
        add_header Cache-Control "public, max-age=604800";
        add_header Content-Type "application/manifest+json";
    }

    # Service Worker (no cache)
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    # ============================================
    # FAVICON & ICONS
    # ============================================
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Apple touch icons
    location ~* ^/apple-touch-icon.*\.png$ {
        log_not_found off;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # ERROR PAGES
    # ============================================
    error_page 404 /index.html;

    # ============================================
    # API ERROR HANDLING - Return JSON errors for /api/ routes
    # Prevents 502 from being masked as 404 when backend is down
    # ============================================
    error_page 502 503 504 @backend_down;

    location @backend_down {
        default_type application/json;
        return 502 '{"error": "Le chatbot backend est temporairement indisponible. Veuillez réessayer dans quelques instants.", "status": 502}';
    }

    # ============================================
    # DENY ACCESS TO HIDDEN FILES
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================
    # HEALTH CHECK (for Cloud Run)
    # ============================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # HEALTH CHECK CHATBOT BACKEND
    # ============================================
    location /api/health {
        proxy_pass http://chatbot_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        access_log off;
    }
}